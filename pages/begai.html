<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Trang Sản Phẩm</title>
  <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
  <link rel="stylesheet" href="../assets/bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/bootstrap-icons-1.13.1/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/mylinh.css"> <!-- Đổi tên file CSS nếu cần -->
</head>

<body>
  <header>
    <h1>Đồ Bé Gái </h1>
  </header>

  <aside class="main-layout">
    <!-- Bộ lọc bên trái -->
    <aside class="filters">
      <label>Kích thước:
        <select>
          <option>Tất cả</option>
          <option>13-18</option>
          <option>18-25</option>
          <option>25-34</option>
        </select>
      </label>
      <label>Giá:
        <select>
          <option>Tất cả</option>
          <option>Dưới 150k</option>
          <option>150k - 180k</option>
          <option>180k - 500k</option>
          <option>Trên 500k</option>
        </select>
      </label>
      <label>Chất liệu:
        <select>
          <option>Tất cả</option>
          <option>Thun</option>
          <option>Dạ</option>
          <option>Lanh</option>
          <option>cotton</option>
        </select>
      </label>
    </aside>

    <!-- Lưới sản phẩm bên phải -->
    <section class="product-grid">
      <div class="product-card">
        <img src="../assets/images/nữ 1.jpg" alt="Bộ đồ hồng">
        <h3> Bộ đồ hồng dễ thương cho bé gái</h3>
        <p class="price">156.000₫ <span class="old-price">189.000₫</span></p>
        <button class="buy-button">Mua ngay</button>
      </div>
      <div class="product-card">
        <img src="../assets/images/nữ 2.jpg" alt="váy công chúa">
        <h3>Váy hồng công chúa cho bé gái</h3>
        <p class="price">249.000₫ <span class="old-price">312.000₫</span></p>
        <button class="buy-button">Mua ngay</button>
      </div>
      <div class="product-card">
        <img src="../assets/images/nữ 3.jpg" alt="Bộ bà ba">
        <h3>Bộ bà bà diện tết cho bé gái</h3>
        <p class="price">165.000₫ <span class="old-price">185.000₫</span></p>
        <button class="buy-button">Mua ngay</button>
      </div>
      <div class="product-card">
        <img src="../assets/images/nữ 4.jpg" alt="Váy đỏ">
        <h3>Váy nhung đỏ cho bé gái </h3>
        <p class="price">199.000₫ <span class="old-price">300.000₫</span></p>
        <button class="buy-button">Mua ngay</button>
      </div>
    </section>
    </main>

    <!-- Scripts -->
    <script src="../js/script.js" defer></script>
    <script src="../js/load-components.js"></script>
    <script src="../assets/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
