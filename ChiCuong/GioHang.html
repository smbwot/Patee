<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - BỘ LANH TRUNG NIÊN</title>
    <link rel="stylesheet" href="ChiCuong.css">
</head>
<body>
    <div class="product-container">
        <div class="product-image-section">
            <img src="file:///C:/Users/hoang/Downloads/trang%20s%E1%BA%A3n%20ph%E1%BA%A9m/New%20folder/%E1%BA%A3nh/mg%202.jpg" alt="BỘ LANH TRUNG NIÊN">
        </div>
        <div class="product-details-section">
            <h1 class="product-title">Váy công chúa nhung đỏ diện tết cho mẹ và bé gái</h1>
            <p class="product-id">Mã sản phẩm: B26.5092</p>
            <p class="product-price">249.000 đ</p>

            <div class="product-options">
                <h4>Size</h4>
                <div class="size-options">
                    <span class="size-box selected" data-size="2XL">2XL</span>
                    <span class="size-box" data-size="XL">XL</span>
                    <span class="size-box" data-size="L">L</span>
                    <span class="size-box" data-size="M">M</span>
                </div>
            </div>

            <div class="size-guide-form">
                <h4>Giúp bạn chọn size</h4>
                <div class="form-group">
                    <label for="height">Chiều cao</label>
                    <input type="number" id="height" placeholder="0cm">
                </div>
                <div class="form-group">
                    <label for="weight">Cân nặng</label>
                    <input type="number" id="weight" placeholder="0kg">
                </div>
            </div>
            <div class="action-buttons">
                <button class="buy-now-btn">MUA NGAY</button>
                <button class="add-to-cart-btn">THÊM VÀO GIỎ</button>
            </div>
        </div>
    </div>
    
    <script src="ChiCuong.js"></script>
</body>
</html>
