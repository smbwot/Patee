<div class="cart" id="cart">
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar">
        <div class="cart-header">
            <h5 class="mb-0">Giỏ hàng</h5>
            <button class="btn-close cart-close" id="cartClose"></button>
        </div>
        <div class="cart-body">
            <div id="cart-empty" class="alert alert-info d-none">Giỏ hàng trống.</div>
            <div id="cart-items" class="cart-items"></div>
        </div>
        <div class="cart-footer">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="fw-bold">Tổng: <span id="cart-total">0₫</span></div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary flex-fill" id="continueShopping">Tiếp tục mua</button>
                <button class="btn btn-success flex-fill" id="checkout-btn" disabled>Thanh toán</button>
            </div>
        </div> 
    </div>
</div>
